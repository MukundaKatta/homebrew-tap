name: bump-on-release

# Daily check (or manual dispatch) that scans every formula in this tap
# and opens a bump PR when the upstream PyPI sdist version is newer than
# what the formula currently references.
#
# Limited to formulas hosted at files.pythonhosted.org (i.e. published
# to PyPI). Non-PyPI formulas are skipped silently.

on:
  schedule:
    - cron: "37 6 * * *"   # daily at 06:37 UTC
  workflow_dispatch:
    inputs:
      formula:
        description: "Specific formula to bump (e.g. bedrockcache). Empty = scan all."
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: detect outdated PyPI formulas
        id: detect
        env:
          ONLY: ${{ inputs.formula }}
        run: |
          set -euo pipefail
          outdated=""
          for f in Formula/*.rb; do
            name=$(basename "$f" .rb)
            if [ -n "$ONLY" ] && [ "$name" != "$ONLY" ]; then continue; fi
            url=$(grep -E '^\s*url\s+"' "$f" | head -1 | sed -E 's/.*"(https:[^"]+)".*/\1/')
            case "$url" in
              https://files.pythonhosted.org/*) ;;
              *) echo "skip $name (non-PyPI url)"; continue ;;
            esac
            local_ver=$(echo "$url" | sed -E 's#.*-([0-9][0-9a-z.+-]*)\.tar\.gz#\1#')
            pypi_ver=$(curl -fsSL "https://pypi.org/pypi/$name/json" | python3 -c 'import sys,json;print(json.load(sys.stdin)["info"]["version"])')
            echo "$name: local=$local_ver pypi=$pypi_ver"
            if [ "$local_ver" != "$pypi_ver" ]; then
              outdated="$outdated $name:$pypi_ver"
            fi
          done
          echo "outdated=${outdated# }" >> "$GITHUB_OUTPUT"
      - name: open bump PRs
        if: steps.detect.outputs.outdated != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OUTDATED: ${{ steps.detect.outputs.outdated }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for pair in $OUTDATED; do
            name="${pair%%:*}"
            new_ver="${pair##*:}"
            branch="auto-bump/$name-$new_ver"
            existing=$(gh pr list --state open --search "head:$branch" --json number --jq 'length' || echo 0)
            if [ "$existing" != "0" ]; then
              echo "PR for $name $new_ver already open, skipping"
              continue
            fi
            git checkout -B "$branch" origin/main
            first_letter="${name:0:1}"
            new_url="https://files.pythonhosted.org/packages/source/$first_letter/$name/$name-$new_ver.tar.gz"
            new_sha=$(curl -fsSL "$new_url" | shasum -a 256 | awk '{print $1}')
            python3 scripts/bump_formula.py "Formula/$name.rb" "$new_url" "$new_sha"
            git add "Formula/$name.rb"
            git commit -m "$name: bump to $new_ver"
            git push -f -u origin "$branch"
            gh pr create --base main --head "$branch" \
              --title "$name: bump to $new_ver" \
              --body "Automated bump. PyPI: https://pypi.org/project/$name/$new_ver/"
          done
